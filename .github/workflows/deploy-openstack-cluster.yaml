name: Deploy OpenStack (Kolla-Ansible)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment / tfvars directory name
        required: true
        default: karafra-net
        type: string
      run_bootstrap_servers:
        description: "Run Kolla-Ansible bootstrap-servers during deployment"
        required: true
        type: boolean
        default: true
      run_pre_checks:
        description: "Run Kolla-Ansible pre-checks during deployment (with --use-test-images)"
        required: true
        type: boolean
        default: true
      run_image_pull:
        description: "Run Kolla-Ansible image pull during deployment"
        required: true
        type: boolean
        default: true
      run_deploy:
        description: "Run Kolla-Ansible deploy during deployment"
        required: true
        type: boolean
        default: true
      run_post_deploy:
        description: "Run Kolla-Ansible post-deploy during deployment"
        required: true
        type: boolean
        default: true
      kolla_stages:
        description: "Comma-separated Kolla stages to run: bootstrap-servers,prechecks,pull,deploy,post-deploy"
        required: true
        type: string
        default: "bootstrap-servers,prechecks,pull,deploy,post-deploy"
  workflow_run:
    workflows:
      - Configure WireGuard mesh
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: openstack-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
  cancel-in-progress: false

jobs:
  deploy-openstack-kolla-minimal:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy OpenStack minimal cluster (controller + compute)
    environment: "${{ inputs.environment }}-openstack"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
      TFVARS_PATH: live/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}/terraform.auto.tfvars
      ANSIBLE_SSH_USER: ubuntu
      KOLLA_STAGE_SET: ",${{ github.event_name == 'workflow_dispatch' && replace(inputs.kolla_stages, ' ', '') || 'bootstrap-servers,prechecks,pull,deploy,post-deploy' }},"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and Kolla dependencies
        # language=bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt


      - name: Materialize SSH private key
        # language=bash
        run: |
          set -eu
          key_path="${RUNNER_TEMP}/ovh_ssh_key"

          gcloud secrets versions access latest --secret="ovh-vps-ssh-private-key" > "${key_path}"

          chmod 600 "$key_path"
          
          printf '\n' >> "${key_path}"

          echo "ANSIBLE_PRIVATE_KEY_FILE=${key_path}" >> "${GITHUB_ENV}"

      - name: Materialize Kolla passwords file
        # language=bash
        run: |
          set -euo pipefail
          passwords_path="${GITHUB_WORKSPACE}/ansible/etc/kolla/passwords.yml"

          mkdir -p "$(dirname "${passwords_path}")"
          gcloud secrets versions access latest --secret="openstack-passwords-yaml" > "${passwords_path}"
          printf '\n' >> "${passwords_path}"
          chmod 600 "${passwords_path}"

          echo "OPENSTACK_KOLLA_PASSWORDS_PATH=${passwords_path}" >> "${GITHUB_ENV}"

      - name: Materialize Octavia client cert and key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-cert-and-key-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/client.cert-and-key.pem

      - name: Materialize Octavia client CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/client_ca.cert.pem

      - name: Materialize Octavia server CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/server_ca.cert.pem

      - name: Materialize Octavia server CA key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-key-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/server_ca.key.pem

      - name: Materialize Octavia CA passphrase env
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-passphrase
          env-name: OPENSTACK_KOLLA_OCTAVIA_CA_PASSWORD

      - name: Materialize Prometheus remote write URL
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-prom-remote-write-url
          env-name: OPENSTACK_KOLLA_PROM_REMOTE_WRITE_URL

      - name: Materialize Prometheus remote write username
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-prom-remote-write-username
          env-name: OPENSTACK_KOLLA_PROM_REMOTE_WRITE_USERNAME

      - name: Materialize Prometheus remote write password
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-prom-remote-write-password
          env-name: OPENSTACK_KOLLA_PROM_REMOTE_WRITE_PASSWORD

      - name: Render Kolla inventory and globals
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        # language=bash
        run: |
          set -euo pipefail
          export VIRTUAL_ENV="${pythonLocation}"
          export PATH="${VIRTUAL_ENV}/bin:${PATH}"

          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/openstack-kolla-maintenance.yml

      - name: Generate SSH config for inventory aliases
        # language=bash
        run: |
          set -euo pipefail
          python ansible/scripts/inventory_from_tfvars.py --write-ssh-config ~/.ssh/config --list

      - name: Validate rendered Kolla inventory host addresses
        # language=bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          import sys
          
          inv = subprocess.check_output([
              "ansible-inventory", "-i", "ansible/.kolla/multinode", "--list"
          ], text=True)
          data = json.loads(inv)
          hostvars = data.get("_meta", {}).get("hostvars", {})
          hosts = sorted(set(data.get("all", {}).get("hosts", [])))
          
          problems = []
          for h in hosts:
              hv = hostvars.get(h, {})
              ansible_host = (hv.get("ansible_host") or "").strip()
              if not ansible_host:
                  problems.append(f"{h}: missing ansible_host")
                  continue
              if ansible_host == h:
                  problems.append(f"{h}: ansible_host resolves to inventory alias '{h}'")
          
          if problems:
              print("Invalid rendered Kolla inventory:", file=sys.stderr)
              for p in problems:
                  print(f" - {p}", file=sys.stderr)
              sys.exit(1)
          
          print("Rendered Kolla inventory validation passed for hosts:", ", ".join(hosts))
          PY

      - name: Validate rendered Kolla role groups (controller vs compute)
        # language=bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import subprocess
          import sys

          data = json.loads(subprocess.check_output([
              "ansible-inventory", "-i", "ansible/.kolla/multinode", "--list"
          ], text=True))

          source = json.loads(subprocess.check_output([
              "python", "ansible/scripts/inventory_from_tfvars.py", "--list"
          ], text=True))
          expected_all_hosts = sorted(set(source.get("ovh_dedicated_servers", {}).get("hosts", [])))
          source_hostvars = source.get("_meta", {}).get("hostvars", {})

          control_hosts = sorted(set(data.get("control", {}).get("hosts", [])))
          compute_hosts = sorted(set(data.get("compute", {}).get("hosts", [])))

          if not expected_all_hosts:
              print("Expected source hosts from inventory_from_tfvars.py to be populated", file=sys.stderr)
              print(json.dumps({
                  "source_group": source.get("ovh_dedicated_servers", {}),
                  "control": data.get("control", {}),
                  "compute": data.get("compute", {}),
              }, indent=2), file=sys.stderr)
              sys.exit(1)

          if len(control_hosts) != 1:
              print(f"Expected exactly 1 controller, got: {control_hosts}", file=sys.stderr)
              sys.exit(1)

          # Derive expected compute hosts from role labels in tfvars
          expected_compute = sorted([
              h for h in expected_all_hosts
              if "compute" in source_hostvars.get(h, {}).get("openstack_roles", [])
          ])
          if compute_hosts != expected_compute:
              print(
                  f"Compute group mismatch: expected {expected_compute}, got {compute_hosts}",
                  file=sys.stderr,
              )
              print(json.dumps({
                  "source_hosts": expected_all_hosts,
                  "control_hosts": control_hosts,
                  "compute_hosts": compute_hosts,
                  "expected_compute": expected_compute,
              }, indent=2), file=sys.stderr)
              sys.exit(1)

          controller = control_hosts[0]
          print(f"Controller={controller}; compute hosts={compute_hosts}")
          PY

      - name: Prepare hosts (Docker, stale container cleanup, libvirt conflicts)
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        # language=bash
        run: |
          set -euo pipefail
          export VIRTUAL_ENV="${pythonLocation}"
          export PATH="${VIRTUAL_ENV}/bin:${PATH}"

          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/prepare-hosts.yml

      - name: Run Kolla-Ansible install-deps
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: install-deps

      - name: Run Kolla-Ansible bootstrap-servers
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: bootstrap-servers
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_bootstrap_servers && contains(env.KOLLA_STAGE_SET, ',bootstrap-servers,') }}

      - name: Run Kolla-Ansible prechecks
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: prechecks
          extra-args: '--use-test-images'
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_pre_checks && contains(env.KOLLA_STAGE_SET, ',prechecks,') }}

      - name: Run Kolla-Ansible pull
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: pull
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_image_pull && contains(env.KOLLA_STAGE_SET, ',pull,') }}

      - name: Run Kolla-Ansible deploy
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: deploy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_deploy && contains(env.KOLLA_STAGE_SET, ',deploy,') }}

      - name: Run Kolla-Ansible post-deploy
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: post-deploy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_post_deploy && contains(env.KOLLA_STAGE_SET, ',post-deploy,') }}
