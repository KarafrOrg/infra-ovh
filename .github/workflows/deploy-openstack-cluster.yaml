name: Deploy OpenStack (Kolla-Ansible)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment / tfvars directory name
        required: true
        default: karafra-net
        type: string
  workflow_run:
    workflows:
      - Configure WireGuard mesh
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: openstack-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
  cancel-in-progress: false

jobs:
  deploy-openstack-kolla-minimal:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy OpenStack minimal cluster (controller + compute)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
      TFVARS_PATH: live/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}/terraform.auto.tfvars
      ANSIBLE_SSH_USER: ubuntu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and Kolla dependencies
        # language=bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt
          python -m pip install kolla-ansible
          python -m pip install --upgrade "ansible-core>=2.17,<2.19"

      - name: Validate Ansible version for Kolla
        # language=bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import subprocess
          from packaging.version import Version

          out = subprocess.check_output(["ansible-playbook", "--version"], text=True)
          first_line = out.splitlines()[0]
          m = re.search(r"core\s+([0-9]+\.[0-9]+(?:\.[0-9]+)?)", first_line)
          if not m:
              raise SystemExit(f"Could not parse ansible version from: {first_line}")

          version = Version(m.group(1))
          if not (Version("2.17.0") <= version < Version("2.19.0")):
              raise SystemExit(f"Unsupported ansible-core version for this Kolla release: {version}")

          print(f"Using ansible-core {version}")
          PY

      - name: Provision Kolla playbooks for CLI
        # language=bash
        run: |
          set -euo pipefail
          kolla_share_dir="${pythonLocation}/share/kolla-ansible"
          kolla_ansible_dir="${pythonLocation}/ansible"
          rm -rf "${kolla_share_dir}"
          mkdir -p "$(dirname "${kolla_share_dir}")"
          git clone --depth 1 --branch stable/2025.1 https://opendev.org/openstack/kolla-ansible "${kolla_share_dir}"

          # kolla-ansible resolves playbooks under ${BASEDIR}/ansible on these runners.
          rm -rf "${kolla_ansible_dir}"
          ln -s "${kolla_share_dir}/ansible" "${kolla_ansible_dir}"

          test -f "${kolla_ansible_dir}/site.yml"
          test -f "${kolla_ansible_dir}/kolla-host.yml"
          test -f "${kolla_ansible_dir}/post-deploy.yml"

      - name: Install Kolla Ansible Galaxy dependencies
        # language=bash
        run: |
          set -euo pipefail
          kolla_share_dir="${pythonLocation}/share/kolla-ansible"
          ansible-galaxy collection install -r "${kolla_share_dir}/requirements.yml" --force
          if [ -f "${kolla_share_dir}/requirements-core.yml" ]; then
            ansible-galaxy collection install -r "${kolla_share_dir}/requirements-core.yml" --force
          fi

      - name: Materialize SSH private key
        # language=bash
        run: |
          set -eu
          key_path="${RUNNER_TEMP}/ovh_ssh_key"

          gcloud secrets versions access latest --secret="ovh-vps-ssh-private-key" > "${key_path}"

          chmod 600 "$key_path"
          
          printf '\n' >> "${key_path}"

          echo "ANSIBLE_PRIVATE_KEY_FILE=${key_path}" >> "${GITHUB_ENV}"

      - name: Materialize Kolla passwords file
        # language=bash
        run: |
          set -euo pipefail
          passwords_path="${GITHUB_WORKSPACE}/ansible/.kolla/config/passwords.yml"

          mkdir -p "$(dirname "${passwords_path}")"
          gcloud secrets versions access latest --secret="openstack-passwords-yaml" > "${passwords_path}"
          printf '\n' >> "${passwords_path}"
          chmod 600 "${passwords_path}"

          echo "OPENSTACK_KOLLA_PASSWORDS_PATH=${passwords_path}" >> "${GITHUB_ENV}"

      - name: Materialize Octavia client cert and key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-cert-and-key-pem
          destination-path: ${{ github.workspace }}/ansible/.kolla/config/octavia/client.cert-and-key.pem

      - name: Materialize Octavia client CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/.kolla/config/octavia/client_ca.cert.pem

      - name: Materialize Octavia server CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/.kolla/config/octavia/server_ca.cert.pem

      - name: Materialize Octavia server CA key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-key-pem
          destination-path: ${{ github.workspace }}/ansible/.kolla/config/octavia/server_ca.key.pem

      - name: Materialize Octavia CA passphrase env
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-passphrase
          env-name: OPENSTACK_KOLLA_OCTAVIA_CA_PASSWORD

      - name: Deploy OpenStack cluster with Kolla-Ansible
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        # language=bash
        run: |
          set -euo pipefail
          export VIRTUAL_ENV="${pythonLocation}"
          export PATH="${VIRTUAL_ENV}/bin:${PATH}"
          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/openstack-kolla-minimal.yml \
            --private-key "${ANSIBLE_PRIVATE_KEY_FILE}"
