name: Ansible syntax checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_CONFIG: ansible/ansible.cfg
      TFVARS_PATH: live/karafra-net/terraform.auto.tfvars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible dependencies
        # language=bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt
        shell: bash

      - name: Run syntax checks
        # language=bash
        run: |
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/wireguard.yml --syntax-check
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/openstack-kolla-minimal.yml --syntax-check
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/openstack-kolla-maintenance.yml --syntax-check
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/prepare-hosts.yml --syntax-check
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/setup-prometheus.yml --syntax-check
          ansible-playbook -i ansible/scripts/inventory_from_tfvars.py ansible/playbooks/manage-cloudflare-tunnel.yml --syntax-check
        shell: bash
