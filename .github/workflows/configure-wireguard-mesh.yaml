name: Configure WireGuard mesh

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment / tfvars directory name
        required: true
        default: karafra-net
        type: string
  workflow_run:
    workflows:
      - Reinstall dedicated servers
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: wireguard-mesh-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
  cancel-in-progress: false

jobs:
  configure-wireguard-mesh:
    name: Configure WireGuard mesh on OVH dedicated servers
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
      TFVARS_PATH: live/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}/terraform.auto.tfvars
      ANSIBLE_SSH_USER: ubuntu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible dependencies
        # language=bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt

      - name: Materialize SSH private key
        # language=bash
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/ovh_ssh_key"
          raw_key_path="${RUNNER_TEMP}/ovh_ssh_key.raw"

          gcloud secrets versions access latest --secret="ovh-vps-ssh-private-key" > "${raw_key_path}"

          # Accept raw PEM/OpenSSH keys, escaped newline payloads, or base64-encoded key payloads.
          RAW_KEY_PATH="${raw_key_path}" KEY_PATH="${key_path}" python - <<'PY'
          import base64
          import os
          import pathlib

          raw_path = pathlib.Path(os.environ["RAW_KEY_PATH"])
          key_path = pathlib.Path(os.environ["KEY_PATH"])
          raw = raw_path.read_text(encoding="utf-8").strip()

          candidates = []
          candidates.append(raw.replace("\\r", ""))
          candidates.append(raw.replace("\\r", "").replace("\\n", "\n"))

          compact = "".join(raw.split())
          try:
              decoded = base64.b64decode(compact, validate=True).decode("utf-8", errors="strict")
              candidates.append(decoded.replace("\r", ""))
              candidates.append(decoded.replace("\r", "").replace("\\n", "\n"))
          except Exception:
              pass

          marker = "-----BEGIN"
          selected = next((c.strip() for c in candidates if marker in c), "")
          if not selected:
              raise SystemExit("The secret ovh-vps-ssh-private-key does not look like a valid SSH private key payload.")

          key_path.write_text(selected.rstrip() + "\n", encoding="utf-8")
          PY

          chmod 600 "${key_path}"
          ssh-keygen -y -f "${key_path}" > /dev/null
          echo "ANSIBLE_PRIVATE_KEY_FILE=${key_path}" >> "${GITHUB_ENV}"

      - name: Show generated inventory
        # language=bash
        run: |
          python ansible/scripts/inventory_from_tfvars.py --list | python -m json.tool

      - name: Configure WireGuard mesh
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        # language=bash
        run: |
          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/wireguard.yml \
            --private-key "${ANSIBLE_PRIVATE_KEY_FILE}"
