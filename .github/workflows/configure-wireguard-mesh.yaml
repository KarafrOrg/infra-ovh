name: Configure WireGuard mesh

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment / tfvars directory name
        required: true
        default: karafra-net
        type: string
  workflow_run:
    workflows:
      - Reinstall dedicated servers
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: wireguard-mesh-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
  cancel-in-progress: false

jobs:
  configure-wireguard-mesh:
    name: Configure WireGuard mesh on OVH dedicated servers
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}
      TFVARS_PATH: live/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'karafra-net' }}/terraform.auto.tfvars
      ANSIBLE_SSH_USER: ubuntu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible dependencies
        # language=bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt

      - name: Materialize SSH private key
        # language=bash
        run: |
          set -euo pipefail
          raw_key_path="${RUNNER_TEMP}/ovh_ssh_key.raw"
          key_path="${RUNNER_TEMP}/ovh_ssh_key"

          gcloud secrets versions access latest --secret="ovh-vps-ssh-private-key" > "${raw_key_path}"

          # Keep key payload intact; only remove transport artifacts that break OpenSSH parsing.
          LC_ALL=C tr -d '\r' < "${raw_key_path}" > "${key_path}"
          sed -i '1s/^\xEF\xBB\xBF//' "${key_path}"

          if ! grep -q '^-----BEGIN OPENSSH PRIVATE KEY-----$' "${key_path}"; then
            echo "Secret ovh-vps-ssh-private-key is not in OPENSSH private key format." >&2
            echo "Expected first line: -----BEGIN OPENSSH PRIVATE KEY-----" >&2
            exit 1
          fi

          if ! grep -q '^-----END OPENSSH PRIVATE KEY-----$' "${key_path}"; then
            echo "Secret ovh-vps-ssh-private-key is missing END marker." >&2
            exit 1
          fi

          if grep -q '\\n' "${key_path}"; then
            echo "Secret ovh-vps-ssh-private-key appears to contain literal \\n escapes." >&2
            echo "Store it as real multiline text in Secret Manager." >&2
            exit 1
          fi

          chmod 600 "${key_path}"
          if ! ssh-keygen -y -f "${key_path}" > /dev/null 2>&1; then
            echo "OpenSSH failed to parse ovh-vps-ssh-private-key (libcrypto)." >&2
            echo "Re-check how the key was stored in Secret Manager (multiline, unencrypted private key)." >&2
            exit 1
          fi

          echo "ANSIBLE_PRIVATE_KEY_FILE=${key_path}" >> "${GITHUB_ENV}"

      - name: SSH preflight check
        # language=bash
        run: |
          set -euo pipefail
          for host in 198.27.70.67 54.36.168.182; do
            ssh -i "${ANSIBLE_PRIVATE_KEY_FILE}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile="${RUNNER_TEMP}/known_hosts" \
              -o ConnectTimeout=10 \
              "${ANSIBLE_SSH_USER}@${host}" "echo ssh_ok"
          done

      - name: Show generated inventory
        # language=bash
        run: |
          python ansible/scripts/inventory_from_tfvars.py --list | python -m json.tool

      - name: Configure WireGuard mesh
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        # language=bash
        run: |
          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/wireguard.yml \
            --private-key "${ANSIBLE_PRIVATE_KEY_FILE}"
