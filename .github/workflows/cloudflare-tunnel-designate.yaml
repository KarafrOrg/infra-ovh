name: Cloudflare tunnel - Designate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform live environment directory under live/
        required: true
        default: karafra-net
        type: string
      origin_url:
        description: Designate origin URL (used in quick mode)
        required: false
        default: http://10.44.0.254:9001
        type: string
      mode:
        description: Tunnel mode
        required: false
        default: token
        type: choice
        options:
          - token
          - quick
      state:
        description: Desired tunnel state
        required: false
        default: present
        type: choice
        options:
          - present
          - absent
  workflow_call:
    inputs:
      environment:
        description: Terraform live environment directory under live/
        required: true
        default: karafra-net
        type: string
      origin_url:
        description: Designate origin URL (used in quick mode)
        required: false
        default: http://10.44.0.254:9001
        type: string
      mode:
        description: Tunnel mode
        required: false
        default: token
        type: string
      state:
        description: Desired tunnel state
        required: false
        default: present
        type: string
permissions:
  contents: read
  id-token: write

jobs:
  designate-tunnel:
    uses: ./.github/workflows/cloudflare-tunnel.yaml
    with:
      environment: ${{ inputs.environment }}
      tunnel_name: Designate
      origin_url: ${{ inputs.origin_url }}
      mode: ${{ inputs.mode }}
      state: ${{ inputs.state }}
      token_gcp_secret: cloudflare-tunnel-token-openstack-designate
