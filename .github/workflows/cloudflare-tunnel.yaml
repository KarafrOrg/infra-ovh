name: Cloudflare tunnel (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Terraform live environment directory under live/
        required: true
        type: string
      tunnel_name:
        description: Logical tunnel name — used as container suffix and GCP secret lookup base
        required: true
        type: string
      origin_url:
        description: Origin URL the tunnel proxies to (required for quick mode)
        required: false
        default: ""
        type: string
      token_gcp_secret:
        description: >-
          GCP Secret Manager secret name holding the Cloudflare tunnel token.
          Defaults to cloudflare-token-{tunnel_name}.
        required: false
        default: ""
        type: string
      mode:
        description: Tunnel mode — token (named, persistent) or quick (temporary)
        required: false
        default: token
        type: string
      state:
        description: Desired state — present (running) or absent (stopped and removed)
        required: false
        default: present
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  manage-tunnel:
    runs-on: ubuntu-latest
    env:
      TFVARS_PATH: live/${{ inputs.environment }}/terraform.auto.tfvars
      ANSIBLE_CONFIG: ansible/ansible.cfg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Cloudflare token secret name
        id: resolve_secret
        # language=bash
        run: |
          secret="${{ inputs.token_gcp_secret }}"
          if [[ -z "$secret" ]]; then
            secret="cloudflare-token-${{ inputs.tunnel_name }}"
          fi
          echo "secret_name=$secret" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Materialize Cloudflare tunnel token
        if: ${{ inputs.state == 'present' && inputs.mode == 'token' }}
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: ${{ steps.resolve_secret.outputs.secret_name }}
          env-name: CLOUDFLARE_TUNNEL_TOKEN

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ansible/requirements.txt

      - name: Configure SSH key
        uses: ./.github/actions/setup-ssh-key
        with:
          secret-name: ovh-vps-ssh-private-key

      - name: Manage Cloudflare tunnel
        # language=bash
        run: |
          set -euo pipefail
          test -f ansible/.kolla/multinode || {
            echo "Missing ansible/.kolla/multinode. Run bootstrap/deploy first." >&2
            exit 1
          }

          extra_args=(
            -e "cloudflare_tunnel_name=${{ inputs.tunnel_name }}"
            -e "cloudflare_tunnel_state=${{ inputs.state }}"
            -e "cloudflare_tunnel_mode=${{ inputs.mode }}"
          )

          if [[ -n "${{ inputs.origin_url }}" ]]; then
            extra_args+=(-e "cloudflare_tunnel_origin_url=${{ inputs.origin_url }}")
          fi

          if [[ "${{ inputs.state }}" == "present" && "${{ inputs.mode }}" == "token" ]]; then
            extra_args+=(-e "cloudflare_tunnel_token=${CLOUDFLARE_TUNNEL_TOKEN}")
          fi

          ansible-playbook \
            -i ansible/.kolla/multinode \
            ansible/playbooks/manage-cloudflare-tunnel.yml \
            --private-key ~/.ssh/id_ed25519 \
            "${extra_args[@]}"
        shell: bash
