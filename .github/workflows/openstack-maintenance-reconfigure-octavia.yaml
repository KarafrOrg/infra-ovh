name: OpenStack maintenance - Reconfigure Octavia

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform live environment directory under live/
        required: true
        default: karafra-net
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  octavia-reconfigure:
    runs-on: ubuntu-latest
    environment: "${{ github.event.inputs.environment }}-openstack"
    env:
      TFVARS_PATH: live/${{ github.event.inputs.environment || 'karafra-net' }}/terraform.auto.tfvars
      ANSIBLE_CONFIG: ansible/ansible.cfg
      OPENSTACK_KOLLA_PASSWORDS_PATH: ${{ github.workspace }}/ansible/etc/kolla/passwords.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_RESOURCE_ID }}
          service_account: gha-infra-ovh@karafra-net.iam.gserviceaccount.com

      - name: Materialize Octavia client cert and key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-cert-and-key-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/client.cert-and-key.pem

      - name: Materialize Octavia client CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-client-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/client_ca.cert.pem

      - name: Materialize Octavia server CA cert
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-cert-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/server_ca.cert.pem

      - name: Materialize Octavia server CA key
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-key-pem
          destination-path: ${{ github.workspace }}/ansible/etc/kolla/config/octavia/server_ca.key.pem

      - name: Materialize Octavia CA passphrase env
        uses: ./.github/actions/materialize-secret
        with:
          secret-name: openstack-octavia-server-ca-passphrase
          env-name: OPENSTACK_KOLLA_OCTAVIA_CA_PASSWORD

      - name: Set up ansible
        uses: ./.github/actions/setup-ansible

      - name: Render Kolla inventory and globals
        # language=bash
        run: |
          set -euo pipefail
          python ansible/scripts/inventory_from_tfvars.py --write-ssh-config ~/.ssh/config --list
          ansible-playbook \
            -i ansible/scripts/inventory_from_tfvars.py \
            ansible/playbooks/openstack-kolla-maintenance.yml
        shell: bash

      - name: Run Kolla-Ansible install-deps
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: install-deps

      - name: Run Kolla-Ansible reconfigure (prometheus)
        uses: ./.github/actions/run-kolla-ansible
        with:
          command: reconfigure
          extra-args: "--tags octavia"
