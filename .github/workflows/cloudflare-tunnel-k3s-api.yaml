name: Cloudflare Tunnel - K3s API Server Access

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform live environment directory under live/
        required: true
        default: karafra-net
        type: string
      origin_url:
        description: K3s API server URL to forward
        required: false
        default: tcp://10.200.0.10:6443
        type: string
      mode:
        description: Tunnel mode
        required: false
        default: token
        type: choice
        options:
          - token
          - quick
      state:
        description: Desired tunnel state
        required: false
        default: present
        type: choice
        options:
          - present
          - absent

permissions:
  contents: read
  id-token: write

jobs:
  horizon-tunnel:
    uses: ./.github/workflows/cloudflare-tunnel.yaml
    with:
      environment: ${{ inputs.environment }}
      tunnel_name: horizon
      origin_url: ${{ inputs.origin_url }}
      mode: ${{ inputs.mode }}
      state: ${{ inputs.state }}
      token_gcp_secret: cloudflare-tunnel-token-k3s-api
