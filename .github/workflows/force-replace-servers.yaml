name: Force replace dedicated servers
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (plan only, no apply)"
        required: true
        type: boolean
        default: true

concurrency: unique-state-lock

permissions:
  contents: read
  id-token: write

jobs:
  replace-servers-plan:
    if: ${{ inputs.dry_run == true }}
    uses: KarafrOrg/actions-terraform-core/.github/workflows/plan.yaml@v0.1.1
    name: Plan server replacement (dry run)
    with:
      environment: karafra-net
      gcp_sa_email: gha-infra-ovh@karafra-net.iam.gserviceaccount.com
      gcp_wif_resource_id: ${{ vars.GCP_WIF_RESOURCE_ID }}
      plan_command: replace-servers-plan
    secrets: inherit

  replace-servers:
    if: ${{ inputs.dry_run == false }}
    uses: KarafrOrg/actions-terraform-core/.github/workflows/apply.yaml@v0.1.1
    name: Force replace dedicated servers
    with:
      environment: karafra-net
      gcp_sa_email: gha-infra-ovh@karafra-net.iam.gserviceaccount.com
      gcp_wif_resource_id: ${{ vars.GCP_WIF_RESOURCE_ID }}
      apply_command: replace-servers
    secrets: inherit
