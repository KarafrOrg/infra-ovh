name: Run Kolla-Ansible command
description: Execute one kolla-ansible command with shared config/inventory/passwords and tee logs

inputs:
  command:
    description: Kolla-Ansible command to run (e.g. deploy, prechecks, reconfigure)
    required: true
  extra-args:
    description: Optional additional CLI arguments to append after the command/options
    required: false
    default: ""
  kolla-cmd:
    description: Path to kolla-ansible executable
    required: false
    default: ""
  configdir:
    description: Kolla config directory
    required: false
    default: ""
  inventory:
    description: Kolla inventory path
    required: false
    default: ""
  passwords-path:
    description: Kolla passwords file path
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run kolla-ansible
      shell: bash
      # language=bash
      run: |
        set -euo pipefail

        kolla_cmd="${{ inputs.kolla-cmd }}"
        configdir="${{ inputs.configdir }}"
        inventory="${{ inputs.inventory }}"
        passwords_path="${{ inputs.passwords-path }}"
        extra_args="${{ inputs.extra-args }}"
        command_name="${{ inputs.command }}"

        supported_commands=(
          bootstrap-servers
          certificates
          check
          deploy
          deploy-bifrost
          deploy-containers
          deploy-servers
          destroy
          gather-facts
          genconfig
          install-deps
          mariadb-backup
          mariadb-recovery
          migrate-container-engine
          nova-libvirt-cleanup
          octavia-certificates
          post-deploy
          prechecks
          prune-images
          pull
          rabbitmq-reset-state
          reconfigure
          stop
          upgrade
          upgrade-bifrost
          validate-config
        )
        if [[ ! " ${supported_commands[*]} " =~ " ${command_name} " ]]; then
          echo "Unsupported kolla-ansible command: ${command_name}" >&2
          echo "Supported commands: ${supported_commands[*]}" >&2
          exit 2
        fi

        if [[ -z "$kolla_cmd" ]]; then
          for candidate in \
            "${GITHUB_WORKSPACE}/ansible/.kolla/venv/bin/kolla-ansible" \
            "${pythonLocation:-}/bin/kolla-ansible" \
            "$(command -v kolla-ansible 2>/dev/null || true)"; do
            if [[ -n "$candidate" && -x "$candidate" ]]; then
              kolla_cmd="$candidate"
              break
            fi
          done
        fi
        if [[ -z "$kolla_cmd" || ! -x "$kolla_cmd" ]]; then
          echo "Unable to find executable kolla-ansible binary." >&2
          echo "Tried .kolla venv, setup-python bin, and PATH." >&2
          exit 127
        fi
        if [[ -z "$configdir" ]]; then
          configdir="${GITHUB_WORKSPACE}/ansible/etc/kolla"
        fi
        if [[ -z "$inventory" ]]; then
          inventory="${GITHUB_WORKSPACE}/ansible/.kolla/multinode"
        fi
        if [[ -z "$passwords_path" ]]; then
          passwords_path="${OPENSTACK_KOLLA_PASSWORDS_PATH:-${GITHUB_WORKSPACE}/ansible/etc/kolla/passwords.yml}"
        fi
        if [[ ! -d "$configdir" ]]; then
          echo "Kolla config directory not found: $configdir" >&2
          exit 2
        fi
        if [[ ! -f "$inventory" ]]; then
          echo "Kolla inventory file not found: $inventory" >&2
          echo "Generate it before running kolla-ansible commands." >&2
          exit 2
        fi
        if [[ ! -f "$passwords_path" ]]; then
          echo "Kolla passwords file not found: $passwords_path" >&2
          exit 2
        fi
        kolla_bindir="$(dirname "$kolla_cmd")"
        # kolla-ansible shells out to ansible-playbook; force it to use the same venv toolchain.
        export PATH="${kolla_bindir}:${PATH}"
        export VIRTUAL_ENV="$(dirname "$kolla_bindir")"

        args=(
          "$command_name"
          --configdir "$configdir"
          --inventory "$inventory"
          --passwords "$passwords_path"
        )

        if [[ -n "$extra_args" ]]; then
          # Parse quoted CLI fragments safely (e.g. --limit "node 1" --tags prechecks)
          mapfile -t extra < <(python3 -c 'import shlex,sys; [print(x) for x in shlex.split(sys.argv[1])]' "$extra_args")
          args+=("${extra[@]}")
        fi

        echo "Running kolla-ansible ${command_name}"
        printf 'Command argv: %q ' "$kolla_cmd" "${args[@]}"
        printf '\n'

        "$kolla_cmd" "${args[@]}"
