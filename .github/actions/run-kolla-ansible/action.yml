name: Run Kolla-Ansible command
description: Execute one kolla-ansible command with shared config/inventory/passwords and tee logs

inputs:
  command:
    description: Kolla-Ansible command to run (e.g. deploy, prechecks, reconfigure)
    required: true
  extra-args:
    description: Optional additional CLI arguments to place before the command
    required: false
    default: ""
  kolla-cmd:
    description: Path to kolla-ansible executable
    required: false
    default: ""
  configdir:
    description: Kolla config directory
    required: false
    default: ""
  inventory:
    description: Kolla inventory path
    required: false
    default: ""
  passwords-path:
    description: Kolla passwords file path
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run kolla-ansible
      shell: bash
      # language=bash
      run: |
        set -euo pipefail

        kolla_cmd="${{ inputs.kolla-cmd }}"
        configdir="${{ inputs.configdir }}"
        inventory="${{ inputs.inventory }}"
        passwords_path="${{ inputs.passwords-path }}"
        extra_args="${{ inputs.extra-args }}"
        command_name="${{ inputs.command }}"

        if [[ -z "$kolla_cmd" ]]; then
          kolla_cmd="${GITHUB_WORKSPACE}/ansible/.kolla/venv/bin/kolla-ansible"
        fi
        if [[ -z "$configdir" ]]; then
          configdir="${GITHUB_WORKSPACE}/ansible/etc/kolla"
        fi
        if [[ -z "$inventory" ]]; then
          inventory="${GITHUB_WORKSPACE}/ansible/.kolla/multinode"
        fi
        if [[ -z "$passwords_path" ]]; then
          passwords_path="${OPENSTACK_KOLLA_PASSWORDS_PATH:-${GITHUB_WORKSPACE}/ansible/etc/kolla/passwords.yml}"
        fi
        kolla_bindir="$(dirname "$kolla_cmd")"
        # kolla-ansible shells out to ansible-playbook; force it to use the same venv toolchain.
        export PATH="${kolla_bindir}:${PATH}"
        export VIRTUAL_ENV="$(dirname "$kolla_bindir")"

        args=(
          --configdir "$configdir"
          --inventory "$inventory"
          --passwords "$passwords_path"
        )

        if [[ -n "$extra_args" ]]; then
          read -r -a extra <<< "$extra_args"
          args+=("${extra[@]}")
        fi

        args+=("$command_name")

        echo "Running kolla-ansible ${command_name}"
        
        "$kolla_cmd" "${args[@]}"
