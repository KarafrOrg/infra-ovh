inputs:
  inputs:
    python-version:
      description: Python version to set up for Ansible execution
      required: false
      default: "3.11"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Install Ansible dependencies
      # language=bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r ansible/requirements.txt
      shell: bash

    - name: Configure SSH key
      uses: ./.github/actions/setup-ssh-key
      with:
        secret-name: ovh-vps-ssh-private-key

    - name: Show generated inventory
      # language=bash
      run: |
        python ansible/scripts/inventory_from_tfvars.py --list | python -m json.tool
      shell: bash
