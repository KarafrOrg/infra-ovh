---
- name: Install WireGuard packages
  ansible.builtin.apt:
    name: "{{ wireguard_packages }}"
    state: present
    update_cache: true

- name: Ensure WireGuard configuration directory exists
  ansible.builtin.file:
    path: "{{ wireguard_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check whether the WireGuard private key already exists
  ansible.builtin.stat:
    path: "{{ wireguard_config_dir }}/privatekey"
  register: wireguard_privatekey_stat

- name: Generate WireGuard private key
  ansible.builtin.command: wg genkey
  register: wireguard_private_key_generated
  changed_when: true
  when: not wireguard_privatekey_stat.stat.exists
  no_log: true

- name: Persist WireGuard private key
  ansible.builtin.copy:
    dest: "{{ wireguard_config_dir }}/privatekey"
    content: "{{ wireguard_private_key_generated.stdout }}\n"
    owner: root
    group: root
    mode: "0600"
  when: not wireguard_privatekey_stat.stat.exists
  no_log: true

- name: Read WireGuard private key
  ansible.builtin.slurp:
    src: "{{ wireguard_config_dir }}/privatekey"
  register: wireguard_private_key_file
  no_log: true

- name: Derive WireGuard public key
  ansible.builtin.command: wg pubkey
  args:
    stdin: "{{ wireguard_private_key_file.content | b64decode }}"
  register: wireguard_public_key_result
  changed_when: false
  no_log: true

- name: Publish WireGuard key facts for peer templating
  ansible.builtin.set_fact:
    wireguard_private_key: "{{ wireguard_private_key_file.content | b64decode | trim }}"
    wireguard_public_key: "{{ wireguard_public_key_result.stdout | trim }}"
  no_log: true

- name: Ensure every host has a WireGuard address
  ansible.builtin.assert:
    that:
      - wireguard_address is defined
      - wireguard_address | length > 0
    fail_msg: "wireguard_address must be defined for {{ inventory_hostname }}"

- name: Ensure WireGuard peers are resolvable through /etc/hosts
  ansible.builtin.blockinfile:
    path: "{{ wireguard_hosts_file_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK wireguard_mesh"
    create: false
    block: |
      {% for peer in ansible_play_hosts_all | sort if peer != inventory_hostname %}
      {{ hostvars[peer].wireguard_address | regex_replace('/\d+$', '') }} {{ [hostvars[peer].wireguard_source_host_name | default(peer), peer] | reject('equalto', '') | unique | join(' ') }}
      {% endfor %}
  when:
    - wireguard_manage_hosts_file | bool
    - ansible_play_hosts_all | length > 1

- name: Configure kernel forwarding for WireGuard
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-wireguard-forwarding.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward=1
      net.ipv6.conf.all.forwarding=1
  when: wireguard_enable_ip_forwarding | bool
  notify: Apply sysctl settings

- name: Check whether UFW is installed
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: wireguard_ufw_binary
  when: wireguard_manage_ufw | bool

- name: Allow WireGuard UDP traffic through UFW
  ansible.builtin.command: "ufw allow {{ wireguard_listen_port }}/udp"
  register: wireguard_ufw_rule
  changed_when: "'Skipping adding existing rule' not in ((wireguard_ufw_rule.stdout | default('')) ~ (wireguard_ufw_rule.stderr | default('')))"
  when:
    - wireguard_manage_ufw | bool
    - wireguard_ufw_binary.stat.exists

- name: Render WireGuard mesh configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ wireguard_config_dir }}/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: "0600"
  notify: Restart WireGuard

- name: Ensure WireGuard service is enabled and started
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: "{{ wireguard_service_enabled }}"
    state: "{{ wireguard_service_state }}"
    daemon_reload: true
