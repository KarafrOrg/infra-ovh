---
- name: Build target host list
  ansible.builtin.set_fact:
    openstack_kolla_hosts: "{{ groups[openstack_kolla_target_group] | default([]) | sort }}"

- name: Validate required topology
  ansible.builtin.assert:
    that:
      - openstack_kolla_hosts | length >= 2
    fail_msg: "Need at least 2 hosts in group '{{ openstack_kolla_target_group }}' for 1 controller + 1 compute."

- name: Build per-role host lists from inventory labels
  ansible.builtin.set_fact:
    # Each host's `openstack_roles` is a CSV-derived list (see
    # inventory_from_tfvars.py). A host can carry multiple roles, e.g.
    # `role = "deployment,network,loadbalancer,compute"`.
    openstack_kolla_role_control_hosts: "{{ openstack_kolla_hosts | select('in', _control) | list }}"
    openstack_kolla_role_compute_hosts: "{{ openstack_kolla_hosts | select('in', _compute) | list }}"
    openstack_kolla_role_network_hosts: "{{ openstack_kolla_hosts | select('in', _network) | list }}"
    openstack_kolla_role_loadbalancer_hosts: "{{ openstack_kolla_hosts | select('in', _loadbalancer) | list }}"
    openstack_kolla_role_deployment_hosts: "{{ openstack_kolla_hosts | select('in', _deployment) | list }}"
    openstack_kolla_role_monitoring_hosts: "{{ openstack_kolla_hosts | select('in', _monitoring) | list }}"
    openstack_kolla_role_storage_hosts: "{{ openstack_kolla_hosts | select('in', _storage) | list }}"
  vars:
    _all_roles: "{{ openstack_kolla_hosts | map('extract', hostvars, 'openstack_roles') | list }}"
    _control: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'control') | map(attribute='0') | list }}"
    _compute: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'compute') | map(attribute='0') | list }}"
    _network: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'network') | map(attribute='0') | list }}"
    _loadbalancer: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'loadbalancer') | map(attribute='0') | list }}"
    _deployment: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'deployment') | map(attribute='0') | list }}"
    _monitoring: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'monitoring') | map(attribute='0') | list }}"
    _storage: "{{ openstack_kolla_hosts | zip(_all_roles) | selectattr('1', 'contains', 'storage') | map(attribute='0') | list }}"

- name: Fallback to preferred-host split when no roles labelled
  ansible.builtin.set_fact:
    openstack_kolla_role_control_hosts: "{{ [openstack_kolla_preferred_controller_host] if (openstack_kolla_preferred_controller_host in openstack_kolla_hosts) else [openstack_kolla_hosts[0]] }}"
    openstack_kolla_role_compute_hosts: "{{ openstack_kolla_hosts | reject('equalto', (openstack_kolla_preferred_controller_host if (openstack_kolla_preferred_controller_host in openstack_kolla_hosts) else openstack_kolla_hosts[0])) | list }}"
  when:
    - (openstack_kolla_role_control_hosts | default([]) | length) == 0
    - (openstack_kolla_role_compute_hosts | default([]) | length) == 0

- name: Validate required role tags
  ansible.builtin.assert:
    that:
      - openstack_kolla_role_control_hosts | default([]) | length == 1
      - openstack_kolla_role_compute_hosts | default([]) | length >= 1
      - openstack_kolla_role_loadbalancer_hosts | default([]) | length <= 1
      - openstack_kolla_role_deployment_hosts | default([]) | length <= 1
    fail_msg: >-
      Invalid role labels for group '{{ openstack_kolla_target_group }}'.
      Need exactly 1 control host and >=1 compute host, at most 1 loadbalancer
      and 1 deployment host. Got
      control={{ openstack_kolla_role_control_hosts | default([]) }},
      compute={{ openstack_kolla_role_compute_hosts | default([]) }},
      network={{ openstack_kolla_role_network_hosts | default([]) }},
      loadbalancer={{ openstack_kolla_role_loadbalancer_hosts | default([]) }},
      deployment={{ openstack_kolla_role_deployment_hosts | default([]) }},
      monitoring={{ openstack_kolla_role_monitoring_hosts | default([]) }},
      storage={{ openstack_kolla_role_storage_hosts | default([]) }},
      all={{ openstack_kolla_hosts }}.

- name: Select controller / compute / role-specific hosts
  ansible.builtin.set_fact:
    openstack_kolla_controller_host: "{{ openstack_kolla_role_control_hosts | first }}"
    openstack_kolla_compute_hosts: "{{ openstack_kolla_role_compute_hosts | default([]) }}"
    # Singleton role slots fall back to the controller when their label
    # isn't present anywhere, so smaller clusters keep working unchanged.
    openstack_kolla_loadbalancer_host: "{{ (openstack_kolla_role_loadbalancer_hosts | default([]) | first) if (openstack_kolla_role_loadbalancer_hosts | default([]) | length > 0) else openstack_kolla_role_control_hosts | first }}"
    openstack_kolla_network_host: "{{ (openstack_kolla_role_network_hosts | default([]) | first) if (openstack_kolla_role_network_hosts | default([]) | length > 0) else openstack_kolla_role_control_hosts | first }}"
    openstack_kolla_monitoring_host: "{{ (openstack_kolla_role_monitoring_hosts | default([]) | first) if (openstack_kolla_role_monitoring_hosts | default([]) | length > 0) else openstack_kolla_role_control_hosts | first }}"
    openstack_kolla_storage_host: "{{ (openstack_kolla_role_storage_hosts | default([]) | first) if (openstack_kolla_role_storage_hosts | default([]) | length > 0) else openstack_kolla_role_control_hosts | first }}"
    openstack_kolla_deployment_host: "{{ (openstack_kolla_deployment_host | default('') | trim) if (openstack_kolla_deployment_host | default('') | trim | length > 0) else ((openstack_kolla_role_deployment_hosts | default([]) | first) if (openstack_kolla_role_deployment_hosts | default([]) | length > 0) else (openstack_kolla_role_control_hosts | first)) }}"

- name: Validate controller networking facts
  ansible.builtin.assert:
    that:
      - hostvars[openstack_kolla_controller_host].wireguard_address is defined
    fail_msg: "Controller host is missing wireguard_address. Run wireguard playbook first and ensure inventory provides WireGuard addresses."

- name: Capture controller management interface
  ansible.builtin.set_fact:
    openstack_kolla_controller_management_interface: "{{ hostvars[openstack_kolla_controller_host].ansible_default_ipv4.interface | default('') }}"

- name: Prevent using management interface for Neutron external network
  ansible.builtin.assert:
    that:
      - openstack_kolla_allow_management_interface_for_neutron_external | bool or (openstack_kolla_neutron_external_interface != openstack_kolla_controller_management_interface)
    fail_msg: >-
      Refusing to use management interface '{{ openstack_kolla_controller_management_interface }}' as
      openstack_kolla_neutron_external_interface because it can drop SSH mid-deploy.
      Set openstack_kolla_neutron_external_interface to a dedicated interface (for example '{{ openstack_kolla_external_uplink_interface_name }}')
      or explicitly allow this by setting openstack_kolla_allow_management_interface_for_neutron_external=true.

- name: Ensure Neutron external uplink interface exists on all hosts
  ansible.builtin.command: "ip link show {{ openstack_kolla_external_uplink_interface_name }}"
  register: openstack_kolla_external_uplink_interface_check
  failed_when: false
  changed_when: false
  loop: "{{ openstack_kolla_hosts }}"
  loop_control:
    loop_var: openstack_kolla_host
  delegate_to: "{{ openstack_kolla_host }}"
  become: true
  when:
    - openstack_kolla_prepare_external_uplink_interface | bool
    - openstack_kolla_neutron_external_interface == openstack_kolla_external_uplink_interface_name

- name: Ensure dummy netdev kernel module is available on all hosts
  ansible.builtin.command: modprobe dummy
  changed_when: false
  failed_when: false
  loop: "{{ openstack_kolla_hosts }}"
  loop_control:
    loop_var: openstack_kolla_host
  delegate_to: "{{ openstack_kolla_host }}"
  become: true
  when:
    - openstack_kolla_prepare_external_uplink_interface | bool
    - openstack_kolla_neutron_external_interface == openstack_kolla_external_uplink_interface_name

- name: Create Neutron external uplink interface on all hosts
  ansible.builtin.command: "ip link add {{ openstack_kolla_external_uplink_interface_name }} type dummy"
  loop: "{{ openstack_kolla_external_uplink_interface_check.results | default([]) }}"
  loop_control:
    loop_var: openstack_kolla_external_uplink_result
  delegate_to: "{{ openstack_kolla_external_uplink_result.openstack_kolla_host }}"
  become: true
  register: openstack_kolla_external_uplink_create
  failed_when: >-
    openstack_kolla_external_uplink_create.rc != 0 and
    ('File exists' not in (openstack_kolla_external_uplink_create.stderr | default('')))
  when:
    - openstack_kolla_prepare_external_uplink_interface | bool
    - openstack_kolla_neutron_external_interface == openstack_kolla_external_uplink_interface_name
    - openstack_kolla_external_uplink_result.rc != 0

- name: Bring Neutron external uplink interface up on all hosts
  ansible.builtin.command: "ip link set {{ openstack_kolla_external_uplink_interface_name }} up"
  changed_when: false
  loop: "{{ openstack_kolla_hosts }}"
  loop_control:
    loop_var: openstack_kolla_host
  delegate_to: "{{ openstack_kolla_host }}"
  become: true
  when:
    - openstack_kolla_prepare_external_uplink_interface | bool
    - openstack_kolla_neutron_external_interface == openstack_kolla_external_uplink_interface_name

- name: Compute derived Kolla networking values
  ansible.builtin.set_fact:
    openstack_kolla_wireguard_prefix: "{{ hostvars[openstack_kolla_controller_host].wireguard_address | regex_replace('\\.[0-9]+/.*$', '') }}"
    openstack_kolla_wireguard_host_ips: "{{ openstack_kolla_hosts | map('extract', hostvars, 'wireguard_address') | map('regex_replace', '/.*$', '') | list }}"
    openstack_kolla_controller_wireguard_ip: "{{ hostvars[openstack_kolla_controller_host].wireguard_address | regex_replace('/.*$', '') }}"
    openstack_kolla_compute_wireguard_ips: "{{ openstack_kolla_compute_hosts | map('extract', hostvars, 'wireguard_address') | map('regex_replace', '/.*$', '') | list }}"

- name: Derive wireguard IPs from inventory (always available, no remote facts needed)
  ansible.builtin.set_fact:
    openstack_kolla_wireguard_host_ips: "{{ openstack_kolla_wireguard_host_ips | default(openstack_kolla_hosts | map('extract', hostvars, 'wireguard_address') | map('regex_replace', '/.*$', '') | list) }}"
    openstack_kolla_controller_wireguard_ip: "{{ openstack_kolla_controller_wireguard_ip | default(hostvars[openstack_kolla_controller_host].wireguard_address | regex_replace('/.*$', '')) }}"
    openstack_kolla_compute_wireguard_ips: "{{ openstack_kolla_compute_wireguard_ips | default(openstack_kolla_compute_hosts | map('extract', hostvars, 'wireguard_address') | map('regex_replace', '/.*$', '') | list) }}"
    openstack_kolla_wireguard_prefix: "{{ openstack_kolla_wireguard_prefix | default(hostvars[openstack_kolla_controller_host].wireguard_address | regex_replace('\\.[0-9]+/.*$', '')) }}"
    openstack_kolla_controller_public_ip: "{{ hostvars[openstack_kolla_controller_host].public_ip | default('') | trim }}"

- name: Select loadbalancer host
  ansible.builtin.set_fact:
    # When HAProxy is enabled, prefer the dedicated deployment host so
    # HAProxy doesn't fight controller services for the same wg0 ports.
    # Falls back to the controller if no deployment-tagged host exists.
    openstack_kolla_loadbalancer_host: "{{ (openstack_kolla_role_deployment_hosts | default([]) | first) if (openstack_kolla_enable_haproxy | bool and (openstack_kolla_role_deployment_hosts | default([]) | length) > 0) else openstack_kolla_controller_host }}"

- name: Derive loadbalancer host addresses
  ansible.builtin.set_fact:
    openstack_kolla_loadbalancer_wireguard_ip: "{{ hostvars[openstack_kolla_loadbalancer_host].wireguard_address | regex_replace('/.*$', '') }}"
    openstack_kolla_loadbalancer_public_ip: "{{ hostvars[openstack_kolla_loadbalancer_host].public_ip | default('') | trim }}"

- name: Derive Prometheus target endpoints from discovered hosts
  ansible.builtin.set_fact:
    openstack_kolla_prometheus_node_targets: "{{ openstack_kolla_prometheus_node_targets if (openstack_kolla_prometheus_node_targets | length > 0) else (openstack_kolla_wireguard_host_ips | map('regex_replace', '$', ':9100') | list) }}"
    openstack_kolla_prometheus_cadvisor_targets: "{{ openstack_kolla_prometheus_cadvisor_targets if (openstack_kolla_prometheus_cadvisor_targets | length > 0) else (openstack_kolla_wireguard_host_ips | map('regex_replace', '$', ':18080') | list) }}"
    openstack_kolla_prometheus_server_targets: "{{ openstack_kolla_prometheus_server_targets if (openstack_kolla_prometheus_server_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9091'] }}"
    openstack_kolla_prometheus_alertmanager_targets: "{{ openstack_kolla_prometheus_alertmanager_targets if (openstack_kolla_prometheus_alertmanager_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9093'] }}"
    openstack_kolla_prometheus_openstack_exporter_targets: "{{ openstack_kolla_prometheus_openstack_exporter_targets if (openstack_kolla_prometheus_openstack_exporter_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9198'] }}"
    openstack_kolla_prometheus_blackbox_targets: "{{ openstack_kolla_prometheus_blackbox_targets if (openstack_kolla_prometheus_blackbox_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9115'] }}"
    openstack_kolla_prometheus_memcached_exporter_targets: "{{ openstack_kolla_prometheus_memcached_exporter_targets if (openstack_kolla_prometheus_memcached_exporter_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9150'] }}"
    openstack_kolla_prometheus_mysqld_exporter_targets: "{{ openstack_kolla_prometheus_mysqld_exporter_targets if (openstack_kolla_prometheus_mysqld_exporter_targets | length > 0) else [openstack_kolla_controller_wireguard_ip ~ ':9104'] }}"
    openstack_kolla_prometheus_libvirt_exporter_targets: "{{ openstack_kolla_prometheus_libvirt_exporter_targets if (openstack_kolla_prometheus_libvirt_exporter_targets | length > 0) else (openstack_kolla_compute_wireguard_ips | map('regex_replace', '$', ':9177') | list) }}"

- name: Compute Kolla VIP addresses
  ansible.builtin.set_fact:
    # Internal API traffic terminates on the loadbalancer host's WireGuard IP
    # (HAProxy when enabled, otherwise the controller's own wg0 IP).
    # External endpoint URLs use the loadbalancer host's public IP / FQDN.
    # The database stays on the controller and is reached directly by HAProxy
    # / API services over WireGuard.
    openstack_kolla_internal_vip_address: "{{ openstack_kolla_loadbalancer_wireguard_ip }}"
    openstack_kolla_external_vip_address: "{{ openstack_kolla_loadbalancer_public_ip if (openstack_kolla_loadbalancer_public_ip | length > 0) else openstack_kolla_loadbalancer_wireguard_ip }}"
    openstack_kolla_database_address: "{{ openstack_kolla_controller_wireguard_ip }}"

- name: Validate Kolla VIP addresses
  ansible.builtin.assert:
    that:
      - openstack_kolla_internal_vip_address | length > 0
      - openstack_kolla_external_vip_address | length > 0
      - openstack_kolla_database_address | length > 0
    fail_msg: >-
      Failed to derive Kolla addresses from inventory. internal={{ openstack_kolla_internal_vip_address }},
      external={{ openstack_kolla_external_vip_address }}, database={{ openstack_kolla_database_address }}.

- name: Ensure Kolla working directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ openstack_kolla_work_dir }}"
    - "{{ openstack_kolla_tool_shim_dir }}"
    - "{{ openstack_kolla_config_dir }}"
    - "{{ openstack_kolla_node_custom_config_dir }}"
    - "{{ openstack_kolla_node_custom_config_dir }}/octavia"
    - "{{ openstack_kolla_node_custom_config_dir }}/prometheus/prometheus.yml.d"

- name: Install readlink compatibility shim for kolla-ansible
  ansible.builtin.copy:
    dest: "{{ openstack_kolla_tool_shim_dir }}/readlink"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [ "${1:-}" = "-e" ]; then
        shift
        python3 -c 'import os,sys; rc=0; [print(os.path.realpath(p)) if os.path.exists(p) else (rc:=1) for p in sys.argv[1:]]; sys.exit(rc)' "$@"
        exit $?
      fi
      exec /usr/bin/readlink "$@"

- name: Install getopt compatibility shim for kolla-ansible
  ansible.builtin.copy:
    dest: "{{ openstack_kolla_tool_shim_dir }}/getopt"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # Prefer Homebrew GNU getopt on macOS; fall back to system getopt on Linux.
      _gnu_getopt="{{ openstack_kolla_getopt_bin }}/getopt"
      if [ -x "$_gnu_getopt" ]; then
        exec "$_gnu_getopt" "$@"
      fi
      exec getopt "$@"

- name: Build control-host PATH for kolla commands
  ansible.builtin.set_fact:
    openstack_kolla_exec_path: "{{ [openstack_kolla_getopt_bin, openstack_kolla_tool_shim_dir, openstack_kolla_venv_path ~ '/bin', ansible_env.PATH | default(lookup('env', 'PATH'))] | join(':') }}"

- name: Render Kolla globals configuration
  ansible.builtin.template:
    src: globals.yml.j2
    dest: "{{ openstack_kolla_config_dir }}/globals.yml"
    mode: "0644"

- name: Render Kolla multinode inventory
  ansible.builtin.template:
    src: multinode.j2
    dest: "{{ openstack_kolla_inventory_path }}"
    mode: "0644"

- name: Render Prometheus remote_write extension
  ansible.builtin.template:
    src: prometheus-remote-write.yml.j2
    dest: "{{ openstack_kolla_node_custom_config_dir }}/prometheus/prometheus.yml.d/10-remote-write.yml"
    mode: "0644"

- name: Check that Kolla passwords file is present
  ansible.builtin.stat:
    path: "{{ openstack_kolla_passwords_path }}"
  register: openstack_kolla_passwords_stat

- name: Ensure Python virtualenv for Kolla-Ansible exists
  ansible.builtin.command:
    argv:
      - python3
      - -m
      - venv
      - "{{ openstack_kolla_venv_path }}"
  args:
    creates: "{{ openstack_kolla_venv_path }}/bin/python"
  when: openstack_kolla_manage_control_deps | bool

- name: Install Kolla-Ansible into control-host virtualenv
  ansible.builtin.pip:
    name: "{{ openstack_kolla_pip_packages }}"
    executable: "{{ openstack_kolla_venv_path }}/bin/pip"
  when: openstack_kolla_manage_control_deps | bool

- name: Patch Kolla MariaDB WSREP wait handler for transient query failures
  ansible.builtin.replace:
    path: "{{ openstack_kolla_venv_path }}/share/kolla-ansible/ansible/roles/mariadb/handlers/main.yml"
    regexp: '^\s*until: result\.query_result\[0\]\[0\]\[''Value''\] == "Synced"$'
    replace: "  until: result is succeeded and (result.query_result | default([]) | length > 0) and (result.query_result[0] | length > 0) and (result.query_result[0][0]['Value'] | default('')) == \"Synced\""
  when: openstack_kolla_manage_control_deps | bool

- name: Generate Kolla passwords file when missing
  block:
    - name: Seed Kolla passwords file from example template
      ansible.builtin.copy:
        src: "{{ openstack_kolla_venv_path }}/share/kolla-ansible/etc_examples/kolla/passwords.yml"
        dest: "{{ openstack_kolla_passwords_path }}"
        remote_src: true
        mode: "0600"

    - name: Populate Kolla passwords file
      ansible.builtin.command:
        argv:
          - "{{ openstack_kolla_genpwd_cmd }}"
          - -p
          - "{{ openstack_kolla_passwords_path }}"
      environment:
        PATH: "{{ openstack_kolla_exec_path }}"
        VIRTUAL_ENV: "{{ openstack_kolla_venv_path }}"
  when: (not openstack_kolla_passwords_stat.stat.exists) or (openstack_kolla_passwords_stat.stat.size | default(0) | int == 0)

- name: Re-check that Kolla passwords file is present
  ansible.builtin.stat:
    path: "{{ openstack_kolla_passwords_path }}"
  register: openstack_kolla_passwords_stat

- name: Validate Kolla passwords file
  ansible.builtin.assert:
    that:
      - openstack_kolla_passwords_stat.stat.exists
      - openstack_kolla_passwords_stat.stat.size > 0
    fail_msg: "Kolla passwords file is missing or empty at {{ openstack_kolla_passwords_path }}. Set OPENSTACK_KOLLA_PASSWORDS_PATH to an existing secret file or ensure {{ openstack_kolla_genpwd_cmd }} is available."

- name: Ensure Octavia CA password is present in Kolla passwords
  ansible.builtin.lineinfile:
    path: "{{ openstack_kolla_passwords_path }}"
    regexp: '^octavia_ca_password:'
    line: "octavia_ca_password: {{ openstack_kolla_octavia_ca_password | to_json }}"
    mode: "0600"
  when: openstack_kolla_octavia_ca_password | length > 0

- name: Install required Ansible collections for Kolla
  ansible.builtin.command:
    argv:
      - "{{ openstack_kolla_venv_path }}/bin/ansible-galaxy"
      - collection
      - install
      - "{{ item }}"
  environment:
    PATH: "{{ openstack_kolla_exec_path }}"
    VIRTUAL_ENV: "{{ openstack_kolla_venv_path }}"
  loop: "{{ openstack_kolla_required_collections }}"

- name: Install Kolla-Ansible dependencies
  ansible.builtin.command:
    argv:
      - "{{ openstack_kolla_ansible_cmd }}"
      - install-deps
  environment:
    PATH: "{{ openstack_kolla_exec_path }}"
    VIRTUAL_ENV: "{{ openstack_kolla_venv_path }}"
  when: openstack_kolla_install_deps | bool
