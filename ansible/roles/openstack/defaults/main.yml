---
openstack_kolla_target_group: ovh_dedicated_servers
openstack_kolla_work_dir: "{{ (lookup('env', 'GITHUB_WORKSPACE') | default('', true)) | ternary(lookup('env', 'GITHUB_WORKSPACE') ~ '/ansible/.kolla', playbook_dir ~ '/../.kolla') }}"
openstack_kolla_config_dir: "{{ (lookup('env', 'GITHUB_WORKSPACE') | default('', true)) | ternary(lookup('env', 'GITHUB_WORKSPACE') ~ '/ansible/etc/kolla', playbook_dir ~ '/../etc/kolla') }}"
openstack_kolla_node_custom_config_dir: "{{ openstack_kolla_config_dir }}/config"
openstack_kolla_inventory_path: "{{ openstack_kolla_work_dir }}/multinode"
openstack_kolla_passwords_path: "{{ lookup('env', 'OPENSTACK_KOLLA_PASSWORDS_PATH') | default(openstack_kolla_config_dir ~ '/passwords.yml', true) }}"
openstack_kolla_venv_path: "{{ openstack_kolla_work_dir }}/venv"
openstack_kolla_tool_shim_dir: "{{ openstack_kolla_work_dir }}/bin"
openstack_kolla_getopt_bin: "/opt/homebrew/opt/gnu-getopt/bin"
openstack_kolla_manage_control_deps: true
# When false, skips the ansible_default_ipv4 assertion and network_interface derivation.
# Set to false in playbooks that only reconfigure services and don't render globals.yml.
openstack_kolla_needs_network_facts: true
openstack_kolla_pip_packages:
  - ansible-core==2.15.13
  - kolla-ansible>=18.0.0,<19.0.0
  - docker
  - passlib
openstack_kolla_ansible_cmd: "{{ openstack_kolla_venv_path }}/bin/kolla-ansible"
openstack_kolla_genpwd_cmd: "{{ openstack_kolla_venv_path }}/bin/kolla-genpwd"
openstack_kolla_ansible_user: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ubuntu', true) }}"
openstack_kolla_private_key_file: "{{ lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE') | default('', true) }}"
openstack_kolla_release: "2025.1"
openstack_kolla_base_distro: ubuntu
openstack_kolla_base_distro_version: noble
openstack_kolla_install_type: binary
openstack_kolla_tunnel_interface: wg0
openstack_kolla_api_interface: "{{ openstack_kolla_tunnel_interface }}"
openstack_kolla_enable_prometheus: true
openstack_kolla_enable_horizon: true
openstack_kolla_enable_grafana: false
openstack_kolla_enable_octavia: true
openstack_kolla_enable_octavia_jobboard: true
openstack_kolla_enable_valkey: true
openstack_kolla_enable_cinder: false
openstack_kolla_enable_cinder_backend_lvm: true
openstack_kolla_enable_cinder_backup: false
openstack_kolla_enable_fluentd: true
openstack_kolla_enable_keepalived: true
openstack_kolla_enable_proxysql: true
openstack_kolla_enable_haproxy: false
openstack_kolla_cinder_volume_group: "cinder-volumes"
openstack_kolla_prometheus_scrape_interval: "30s"
openstack_kolla_prometheus_remote_write_url: "{{ lookup('env', 'OPENSTACK_KOLLA_PROM_REMOTE_WRITE_URL') | default('', true) }}"
openstack_kolla_prometheus_remote_write_username: "{{ lookup('env', 'OPENSTACK_KOLLA_PROM_REMOTE_WRITE_USERNAME') | default('', true) }}"
openstack_kolla_prometheus_remote_write_password: "{{ lookup('env', 'OPENSTACK_KOLLA_PROM_REMOTE_WRITE_PASSWORD') | default('', true) }}"
openstack_kolla_prometheus_node_targets: []
openstack_kolla_prometheus_cadvisor_targets: []
openstack_kolla_prometheus_server_targets: []
openstack_kolla_prometheus_alertmanager_targets: []
openstack_kolla_prometheus_openstack_exporter_targets: []
openstack_kolla_prometheus_blackbox_targets: []
openstack_kolla_prometheus_memcached_exporter_targets: []
openstack_kolla_prometheus_mysqld_exporter_targets: []
openstack_kolla_prometheus_libvirt_exporter_targets: []
openstack_kolla_octavia_ca_password: "{{ lookup('env', 'OPENSTACK_KOLLA_OCTAVIA_CA_PASSWORD') | default('', true) }}"
openstack_kolla_octavia_certs_country: "SK"
openstack_kolla_octavia_certs_state: "Bratislava"
openstack_kolla_octavia_certs_organization: "karafra"
openstack_kolla_octavia_certs_organizational_unit: "Octavia"
openstack_kolla_octavia_certs_server_ca_common_name: "server-ca.karafra.lan"
openstack_kolla_octavia_certs_client_ca_common_name: "client-ca.karafra.lan"
openstack_kolla_octavia_certs_client_req_common_name: "client.karafra.lan"
openstack_kolla_nova_compute_virt_type: qemu
openstack_kolla_neutron_external_interface: ens3
openstack_kolla_install_deps: false
openstack_kolla_required_collections:
  - community.docker
  - containers.podman
  - community.general
  - ansible.utils
openstack_kolla_internal_vip_override: ""
openstack_kolla_external_vip_override: ""
openstack_kolla_use_controller_ip_as_vip: false
openstack_kolla_internal_vip_host_octet: 254
openstack_kolla_external_vip_host_octet: 253
openstack_kolla_extra_args: ""
