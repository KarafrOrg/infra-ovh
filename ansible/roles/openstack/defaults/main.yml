---
openstack_kolla_target_group: ovh_dedicated_servers
openstack_kolla_work_dir: "{{ (lookup('env', 'GITHUB_WORKSPACE') | default('', true)) | ternary(lookup('env', 'GITHUB_WORKSPACE') ~ '/ansible/.kolla', playbook_dir ~ '/../.kolla') }}"
openstack_kolla_config_dir: "{{ openstack_kolla_work_dir }}/config"
openstack_kolla_inventory_path: "{{ openstack_kolla_work_dir }}/multinode"
openstack_kolla_passwords_path: "{{ lookup('env', 'OPENSTACK_KOLLA_PASSWORDS_PATH') | default(openstack_kolla_config_dir ~ '/passwords.yml', true) }}"
openstack_kolla_ansible_user: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ubuntu', true) }}"
openstack_kolla_private_key_file: "{{ lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE') | default('', true) }}"
openstack_kolla_release: "2025.1"
openstack_kolla_base_distro: ubuntu
openstack_kolla_install_type: binary
openstack_kolla_tunnel_interface: wg0
openstack_kolla_enable_prometheus: true
openstack_kolla_enable_horizon: true
openstack_kolla_enable_grafana: false
openstack_kolla_prometheus_scrape_interval: "60s"
openstack_kolla_prometheus_remote_write_url: "https://prometheus-prod-24-prod-eu-west-2.grafana.net/api/prom/push"
openstack_kolla_prometheus_remote_write_username: "2220727"
openstack_kolla_prometheus_remote_write_password: "glc_eyJvIjoiMTMyNzUxMSIsIm4iOiJzdGFjay0xMTQ4MjQyLWFsbG95LW9wZW5zdGFjay1wbGF0Zm9ybSIsImsiOiI5eW1MODA1MzAwWXM2Qks5T0s3elZRR2EiLCJtIjp7InIiOiJwcm9kLWV1LXdlc3QtMiJ9fQ=="
openstack_kolla_prometheus_node_targets:
  - "localhost:9090"
openstack_kolla_nova_compute_virt_type: qemu
openstack_kolla_install_deps: false
openstack_kolla_internal_vip_override: ""
openstack_kolla_external_vip_override: ""
openstack_kolla_internal_vip_host_octet: 254
openstack_kolla_external_vip_host_octet: 253
openstack_kolla_commands:
  - bootstrap-servers
  - prechecks
  - deploy
  - post-deploy
