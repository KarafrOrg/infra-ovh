---
- name: Validate required tunnel name
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_name | length > 0
    fail_msg: "cloudflare_tunnel_name must be set"

- name: Validate tunnel state
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_state in ['present', 'absent']
    fail_msg: "cloudflare_tunnel_state must be 'present' or 'absent'"

- name: Validate tunnel mode
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_mode in ['token', 'quick']
    fail_msg: "cloudflare_tunnel_mode must be 'token' or 'quick'"

- name: Validate tunnel protocol
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_protocol in ['auto', 'quic', 'http2']
    fail_msg: "cloudflare_tunnel_protocol must be one of: auto, quic, http2"

- name: Validate token is provided for token mode
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_token | length > 0
    fail_msg: "cloudflare_tunnel_token must be set when cloudflare_tunnel_mode=token and state=present"
  when:
    - cloudflare_tunnel_state == 'present'
    - cloudflare_tunnel_mode == 'token'

- name: Validate origin URL is provided for quick mode
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_origin_url | length > 0
    fail_msg: "cloudflare_tunnel_origin_url must be set when cloudflare_tunnel_mode=quick"
  when:
    - cloudflare_tunnel_state == 'present'
    - cloudflare_tunnel_mode == 'quick'

- name: Set cloudflared service facts
  ansible.builtin.set_fact:
    _cloudflare_service_name: "{{ cloudflare_tunnel_service_prefix }}-{{ cloudflare_tunnel_name }}"
    _cloudflare_service_unit_path: "/etc/systemd/system/{{ cloudflare_tunnel_service_prefix }}-{{ cloudflare_tunnel_name }}.service"

- name: Stop cloudflared tunnel service (state=absent)
  ansible.builtin.systemd:
    name: "{{ _cloudflare_service_name }}"
    state: stopped
    enabled: false
    daemon_reload: true
  failed_when: false
  when: cloudflare_tunnel_state == 'absent'

- name: Remove cloudflared tunnel service unit (state=absent)
  ansible.builtin.file:
    path: "{{ _cloudflare_service_unit_path }}"
    state: absent
  when: cloudflare_tunnel_state == 'absent'

- name: Reload systemd daemon after removing cloudflared unit
  ansible.builtin.systemd:
    daemon_reload: true
  when: cloudflare_tunnel_state == 'absent'

- name: End play when state=absent
  ansible.builtin.meta: end_host
  when: cloudflare_tunnel_state == 'absent'

- name: Download Cloudflare GPG key
  ansible.builtin.get_url:
    url: "{{ cloudflare_tunnel_apt_key_url }}"
    dest: "{{ cloudflare_tunnel_apt_keyring_path }}"
    mode: "0644"

- name: Add Cloudflare APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ cloudflare_tunnel_apt_keyring_path }}]
      {{ cloudflare_tunnel_apt_repo_baseurl }}
      {{ ansible_distribution_release }} main
    filename: "{{ cloudflare_tunnel_apt_repo_filename }}"
    state: present

- name: Ensure cloudflared package is installed
  ansible.builtin.apt:
    name: cloudflared
    state: present
    update_cache: true

- name: Ensure cloudflared binary exists
  ansible.builtin.stat:
    path: "{{ cloudflare_tunnel_binary_path }}"
  register: _cloudflare_binary

- name: Validate cloudflared binary path
  ansible.builtin.assert:
    that:
      - _cloudflare_binary.stat.exists
      - _cloudflare_binary.stat.executable
    fail_msg: "cloudflared binary not found or not executable at {{ cloudflare_tunnel_binary_path }}"

- name: Set cloudflared command for token-managed tunnel
  ansible.builtin.set_fact:
    _cloudflare_run_command: >-
      tunnel --no-autoupdate --protocol {{ cloudflare_tunnel_protocol | quote }} run --token {{ cloudflare_tunnel_token | quote }}
  when: cloudflare_tunnel_mode == 'token'
  no_log: true

- name: Set cloudflared command for quick tunnel
  ansible.builtin.set_fact:
    _cloudflare_run_command: >-
      tunnel --no-autoupdate --protocol {{ cloudflare_tunnel_protocol | quote }} --url {{ cloudflare_tunnel_origin_url | quote }}
  when: cloudflare_tunnel_mode == 'quick'

- name: Render cloudflared systemd unit
  ansible.builtin.copy:
    dest: "{{ _cloudflare_service_unit_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Cloudflare Tunnel {{ cloudflare_tunnel_name }}
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ cloudflare_tunnel_service_user }}
      Group={{ cloudflare_tunnel_service_group }}
      ExecStart={{ cloudflare_tunnel_binary_path }} {{ _cloudflare_run_command }}
      Restart=always
      RestartSec=5s
      NoNewPrivileges=true

      [Install]
      WantedBy=multi-user.target
  notify: Restart cloudflared tunnel service
  no_log: true

- name: Ensure cloudflared tunnel service is enabled and started
  ansible.builtin.systemd:
    name: "{{ _cloudflare_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Verify cloudflared tunnel service is active
  ansible.builtin.command:
    argv: [systemctl, is-active, "{{ _cloudflare_service_name }}"]
  register: _cloudflare_service_active
  changed_when: false
  failed_when: _cloudflare_service_active.stdout | trim != "active"

- name: Read quick tunnel URL from service logs
  ansible.builtin.shell: >-
    journalctl -u {{ _cloudflare_service_name }} --no-pager --output=cat
    | grep -Eo 'https://[-a-z0-9]+\.trycloudflare\.com'
    | tail -n 1
  args:
    executable: /bin/bash
  register: _cloudflare_quick_url
  changed_when: false
  failed_when: false
  when: cloudflare_tunnel_mode == 'quick'

- name: Show quick tunnel URL
  ansible.builtin.debug:
    msg: >-
      Quick tunnel URL for '{{ cloudflare_tunnel_name }}':
      {{ _cloudflare_quick_url.stdout | default('not found yet — check: journalctl -u ' ~ _cloudflare_service_name ~ ' --no-pager') }}
  when: cloudflare_tunnel_mode == 'quick'
