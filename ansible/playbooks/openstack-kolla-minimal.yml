---
- name: Prepare OVH nodes for Kolla-Ansible
  hosts: ovh_dedicated_servers
  become: true
  gather_facts: false

  pre_tasks:
    - name: Ensure Python 3 is available on target hosts
      ansible.builtin.raw: test -x /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Ensure Python Docker SDK is installed on target hosts
      ansible.builtin.apt:
        name: python3-docker
        state: present
        update_cache: true

    - name: Ensure Python passlib is installed on target hosts
      ansible.builtin.apt:
        name: python3-passlib
        state: present
        update_cache: true

    - name: Ensure Docker engine is installed on target hosts
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Wait for Docker socket to be available
      ansible.builtin.wait_for:
        path: /var/run/docker.sock
        timeout: 30

- name: Deploy minimal OpenStack with Kolla-Ansible
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openstack_kolla_target_group: ovh_dedicated_servers

  roles:
    - role: openstack