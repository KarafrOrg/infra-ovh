---
- name: Prepare OVH nodes for Kolla-Ansible
  hosts: ovh_dedicated_servers
  become: true
  gather_facts: false
  vars:
    openstack_kolla_reset_host_runtime: "{{ (lookup('env', 'OPENSTACK_KOLLA_RESET_HOST_RUNTIME') | default('false', true)) | bool }}"

  pre_tasks:
    - name: Ensure Python 3 is available on target hosts
      ansible.builtin.raw: test -x /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Ensure Docker engine and dependencies are installed on target hosts
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - python3-docker
          - python3-passlib
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure Docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Ensure Docker units are not masked
      ansible.builtin.command: systemctl unmask {{ item }}
      loop:
        - docker
        - docker.service
        - docker.socket
      changed_when: false
      failed_when: false
      when: openstack_kolla_reset_host_runtime

    - name: Remove stale Docker data directory
      ansible.builtin.file:
        path: /var/lib/docker
        state: absent
      failed_when: false
      when: openstack_kolla_reset_host_runtime

    - name: Ensure Docker service is started when available
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      failed_when: false
      when: openstack_kolla_reset_host_runtime

    - name: Ensure iSCSI service is enabled and running
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Verify Docker is functional on every host (fail fast before Kolla deploy)
      ansible.builtin.command: docker info --format '{{ "{{.ServerVersion}}" }}'
      register: openstack_kolla_docker_verify
      changed_when: false
      failed_when: openstack_kolla_docker_verify.rc != 0

- name: Ensure MariaDB only lives on the controller host
  hosts: ovh_dedicated_servers
  gather_facts: false
  become: true
  vars:
    openstack_kolla_target_group: ovh_dedicated_servers
    openstack_controller_host: >-
      {{ (groups[openstack_kolla_target_group]
          | map('extract', hostvars)
          | selectattr('openstack_roles', 'defined')
          | selectattr('openstack_roles', 'contains', 'control')
          | map(attribute='inventory_hostname')
          | list
          | first)
         | default((groups[openstack_kolla_target_group] | sort)[0]) }}
  tasks:
    - name: Remove stale MariaDB containers on non-controller hosts
      ansible.builtin.command: "docker rm -f {{ item }}"
      loop:
        - mariadb
        - mariadb_bootstrap
        - mariadb_clustercheck
      changed_when: false
      failed_when: false
      when: inventory_hostname != openstack_controller_host

    - name: Remove stale MariaDB volume on non-controller hosts
      ansible.builtin.command: docker volume rm -f mariadb
      changed_when: false
      failed_when: false
      when: inventory_hostname != openstack_controller_host

    - name: Remove stale MariaDB config on non-controller hosts
      ansible.builtin.file:
        path: /etc/kolla/mariadb
        state: absent
      when: inventory_hostname != openstack_controller_host

    - name: Check if MariaDB container is running on the controller
      ansible.builtin.command: docker ps --filter name=^/mariadb$ --filter status=running --format '{{ "{{.ID}}" }}'
      register: mariadb_running
      changed_when: false
      failed_when: false
      when: inventory_hostname == openstack_controller_host

    - name: Check if MariaDB container exists (any state) on the controller
      ansible.builtin.command: docker ps -a --filter name=^/mariadb$ --format '{{ "{{.ID}}" }}'
      register: mariadb_exists
      changed_when: false
      failed_when: false
      when: inventory_hostname == openstack_controller_host

    - name: Remove dead MariaDB container on controller to allow fresh bootstrap
      ansible.builtin.command: docker rm -f mariadb
      when:
        - inventory_hostname == openstack_controller_host
        - mariadb_exists.stdout | default('') | trim != ""
        - mariadb_running.stdout | default('') | trim == ""

    - name: Remove stale MariaDB volume on controller when container is not running
      ansible.builtin.command: docker volume rm -f mariadb
      when:
        - inventory_hostname == openstack_controller_host
        - mariadb_running.stdout | default('') | trim == ""
      changed_when: false
      failed_when: false

    - name: Remove stale MariaDB bootstrap container on controller
      ansible.builtin.command: docker rm -f mariadb_bootstrap
      changed_when: false
      failed_when: false
      when: inventory_hostname == openstack_controller_host

- name: Deploy minimal OpenStack with Kolla-Ansible
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openstack_kolla_target_group: ovh_dedicated_servers

  roles:
    - role: openstack
