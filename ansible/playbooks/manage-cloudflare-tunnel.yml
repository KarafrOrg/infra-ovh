---
# Manage a Cloudflare tunnel on all hosts in the selected target group.
#
# Required extra-vars:
#   cloudflare_tunnel_name        - logical name for the tunnel (used as container suffix)
#   cloudflare_tunnel_state       - present | absent
#   cloudflare_tunnel_mode        - token | quick
#   cloudflare_tunnel_token       - CF named-tunnel token (required when mode=token, state=present)
#   cloudflare_tunnel_origin_url  - origin URL (required when mode=quick)
#
# Optional extra-vars:
#   cloudflare_tunnel_image       - container image (default: cloudflare/cloudflared:latest)
#   cloudflare_tunnel_host_group  - inventory group to target (default in task vars below)

- name: Manage Cloudflare tunnel
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Apply cloudflare-tunnel role on all hosts in target group
      ansible.builtin.include_role:
        name: cloudflare-tunnel
      vars:
        cloudflare_tunnel_host_group: openstack_kolla_hosts
      when:
        - cloudflare_tunnel_host_group in groups
        - groups[cloudflare_tunnel_host_group] | length > 0
        - inventory_hostname in groups[cloudflare_tunnel_host_group]
