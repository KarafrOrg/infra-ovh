---
# Manage a Cloudflare tunnel on all hosts in the selected target group.
#
# Required extra-vars:
#   cloudflare_tunnel_name        - logical name for the tunnel (used as service suffix)
#   cloudflare_tunnel_state       - present | absent
#   cloudflare_tunnel_mode        - token | quick
#   cloudflare_tunnel_token       - CF named-tunnel token (required when mode=token, state=present)
#   cloudflare_tunnel_origin_url  - origin URL (required when mode=quick)
#
# Optional extra-vars:
#   cloudflare_tunnel_host_group  - inventory group to target (default: openstack_kolla_hosts;
#                                   falls back to all hosts if missing)

- name: Manage Cloudflare tunnel
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Apply cloudflare-tunnel role on target hosts
      ansible.builtin.include_role:
        name: cloudflare_tunnel
      when:
        - inventory_hostname in groups.get((cloudflare_tunnel_host_group | default('openstack_kolla_hosts')), groups['all'])
