---
- name: Ensure hostnames resolve to WireGuard (api_interface) addresses
  hosts: ovh_dedicated_servers
  gather_facts: true
  become: true
  tasks:
    - name: Map each node hostname to its WireGuard IP in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*\b{{ hostvars[item].ansible_facts.hostname }}\b'
        line: "{{ hostvars[item].wireguard_address | regex_replace('/.*$', '') }}  {{ hostvars[item].ansible_facts.hostname }}"
        state: present
      loop: "{{ groups['ovh_dedicated_servers'] }}"
      loop_control:
        label: "{{ hostvars[item].ansible_facts.hostname }}"

- name: Prepare compute hosts for containerized libvirt
  hosts: ovh_dedicated_servers
  gather_facts: false
  become: true
  vars:
    openstack_kolla_target_group: ovh_dedicated_servers
    openstack_controller_host: >-
      {{ (groups[openstack_kolla_target_group]
          | map('extract', hostvars)
          | selectattr('openstack_roles', 'defined')
          | selectattr('openstack_roles', 'contains', 'control')
          | map(attribute='inventory_hostname')
          | list
          | first)
         | default((groups[openstack_kolla_target_group] | sort)[0]) }}
  tasks:
    - name: Stop host libvirt daemons that conflict with nova_libvirt container
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - libvirtd
        - libvirtd.socket
        - virtqemud
        - virtqemud.socket
      failed_when: false
      when: inventory_hostname != openstack_controller_host

    - name: Remove stale libvirt socket if present
      ansible.builtin.file:
        path: /var/run/libvirt/libvirt-sock
        state: absent
      when: inventory_hostname != openstack_controller_host

    - name: Kill orphaned libvirtd process left behind by failed runs
      ansible.builtin.shell: |
        pgrep -f '/usr/sbin/libvirtd --listen' | xargs -r kill -9
      args:
        executable: /bin/bash
      failed_when: false
      when: inventory_hostname != openstack_controller_host

    - name: Remove stale libvirtd pidfiles
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /run/libvirtd.pid
        - /var/run/libvirtd.pid
      when: inventory_hostname != openstack_controller_host

    - name: Check if stale nova_libvirt container exists
      ansible.builtin.command: docker ps -a --filter name=^/nova_libvirt$ --format '{{"{{.ID}}"}}'
      register: nova_libvirt_container_id
      changed_when: false
      when: inventory_hostname != openstack_controller_host

    - name: Remove stale nova_libvirt container before redeploy
      ansible.builtin.command: docker rm -f nova_libvirt
      when:
        - inventory_hostname != openstack_controller_host
        - nova_libvirt_container_id.stdout | trim != ""

- name: Clean up stale MariaDB containers on non-controller hosts
  # MariaDB must only run on the [control] host. Any leftover mariadb /
  # mariadb_bootstrap container on another node (from a previous deploy with
  # a different inventory layout) will keep bind-address pointing at the
  # wrong wg IP and prevent Kolla from converging. We don't touch the
  # controller here - kolla-ansible recreates that container itself.
  hosts: ovh_dedicated_servers
  gather_facts: false
  become: true
  vars:
    openstack_kolla_target_group: ovh_dedicated_servers
    openstack_controller_host: >-
      {{ (groups[openstack_kolla_target_group]
          | map('extract', hostvars)
          | selectattr('openstack_roles', 'defined')
          | selectattr('openstack_roles', 'contains', 'control')
          | map(attribute='inventory_hostname')
          | list
          | first)
         | default((groups[openstack_kolla_target_group] | sort)[0]) }}
  tasks:
    - name: Detect Docker on host (skip cleanup tasks if missing)
      ansible.builtin.command: docker info
      register: prepare_docker_info
      changed_when: false
      failed_when: false

    - name: Remove stale MariaDB containers on non-controller hosts
      ansible.builtin.command: "docker rm -f {{ item }}"
      loop:
        - mariadb
        - mariadb_bootstrap
        - mariadb_clustercheck
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname != openstack_controller_host
        - prepare_docker_info.rc == 0

    - name: Remove stale MariaDB config on non-controller hosts
      ansible.builtin.file:
        path: /etc/kolla/mariadb
        state: absent
      when: inventory_hostname != openstack_controller_host

    - name: Check if stale mariadb container exists on the controller
      ansible.builtin.command: docker ps -a --filter name=^/mariadb$ --format '{{"{{.ID}}"}}'
      register: mariadb_container_id
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname == openstack_controller_host
        - prepare_docker_info.rc == 0

    - name: Remove stale mariadb container name on controller before Kolla deploy
      ansible.builtin.command: docker rm -f mariadb
      when:
        - inventory_hostname == openstack_controller_host
        - prepare_docker_info.rc == 0
        - mariadb_container_id.stdout | default('') | trim != ""

    - name: Check if mariadb container is running on controller
      ansible.builtin.command: docker ps --filter name=^/mariadb$ --filter status=running --format '{{"{{.ID}}"}}'
      register: mariadb_running_id
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname == openstack_controller_host
        - prepare_docker_info.rc == 0

    - name: Check if stale mariadb Docker volume exists on controller
      ansible.builtin.command: docker volume inspect mariadb
      register: mariadb_volume_check
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname == openstack_controller_host
        - prepare_docker_info.rc == 0
        - mariadb_running_id.stdout | default('') | trim == ""

    - name: Remove orphaned mariadb volume so Kolla bootstraps fresh
      ansible.builtin.command: docker volume rm mariadb
      when:
        - inventory_hostname == openstack_controller_host
        - prepare_docker_info.rc == 0
        - mariadb_running_id.stdout | default('') | trim == ""
        - mariadb_volume_check.rc | default(1) == 0

- name: Prepare Open vSwitch hosts for containerized OVS
  hosts: ovh_dedicated_servers
  gather_facts: false
  become: true
  tasks:
    - name: Stop host Open vSwitch service that can conflict with Kolla OVS containers
      ansible.builtin.systemd:
        name: openvswitch-switch
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove stale Open vSwitch runtime files
      ansible.builtin.shell: |
        rm -f /run/openvswitch/*.pid /run/openvswitch/*.ctl /run/openvswitch/db.sock
        rm -f /var/run/openvswitch/*.pid /var/run/openvswitch/*.ctl /var/run/openvswitch/db.sock
      args:
        executable: /bin/bash
      changed_when: false

    - name: Check if stale openvswitch_db container exists
      ansible.builtin.command: docker ps -a --filter name=^/openvswitch_db$ --format '{{"{{.ID}}"}}'
      register: openvswitch_db_container_id
      changed_when: false

    - name: Remove stale openvswitch_db container name before Kolla deploy
      ansible.builtin.command: docker rm -f openvswitch_db
      when: openvswitch_db_container_id.stdout | trim != ""
