---
- name: Prepare WireGuard keys and prerequisites
  hosts: baremetal
  gather_facts: true
  become: true
  tasks:
    - name: Install WireGuard packages
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
        update_cache: true

    - name: Ensure WireGuard directory exists
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Check if private key exists
      ansible.builtin.stat:
        path: /etc/wireguard/privatekey
      register: wg_private_key_stat

    - name: Generate WireGuard private key on first run
      ansible.builtin.command: wg genkey
      register: wg_private_key_gen
      changed_when: true
      when: not wg_private_key_stat.stat.exists

    - name: Persist private key
      ansible.builtin.copy:
        dest: /etc/wireguard/privatekey
        content: "{{ wg_private_key_gen.stdout }}\n"
        owner: root
        group: root
        mode: "0600"
      when: not wg_private_key_stat.stat.exists

    - name: Read private key
      ansible.builtin.slurp:
        path: /etc/wireguard/privatekey
      register: wg_private_key_raw

    - name: Set private key fact
      ansible.builtin.set_fact:
        wireguard_private_key: "{{ wg_private_key_raw.content | b64decode | trim }}"

    - name: Compute public key
      ansible.builtin.shell: |
        set -o pipefail
        echo "{{ wireguard_private_key }}" | wg pubkey
      args:
        executable: /bin/bash
      register: wg_public_key_result
      changed_when: false

    - name: Set public key fact
      ansible.builtin.set_fact:
        wireguard_public_key: "{{ wg_public_key_result.stdout | trim }}"

- name: Configure WireGuard mesh
  hosts: baremetal
  gather_facts: false
  become: true
  tasks:
    - name: Render wg0 config
      ansible.builtin.template:
        src: ../templates/wg0.conf.j2
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: "0600"

    - name: Enable IPv4 forwarding only on network node
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: true
      when: inventory_hostname in groups['network']

    - name: Start and enable WireGuard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted
        enabled: true

