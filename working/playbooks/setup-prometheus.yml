---
- name: Render Kolla Prometheus config override for Grafana Cloud remote_write
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure Kolla Prometheus config directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../etc/kolla/config/prometheus"
        state: directory
        mode: "0755"
      tags: [render]

    - name: Render Prometheus override config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/prometheus.yml.j2"
        dest: "{{ playbook_dir }}/../etc/kolla/config/prometheus/prometheus.yml"
        mode: "0600"
      tags: [render]

- name: Apply Prometheus services with Kolla-Ansible
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Reconfigure Prometheus and exporters
      ansible.builtin.command: >-
        kolla-ansible reconfigure
        -i inventory/multinode
        --configdir ./etc/kolla
        --passwords ./etc/kolla/passwords.yml
        --tags prometheus
      args:
        chdir: "{{ playbook_dir }}/.."
      tags: [apply]



