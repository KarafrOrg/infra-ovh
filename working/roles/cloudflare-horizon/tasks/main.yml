---
- name: Validate Cloudflare tunnel mode
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_mode in ['token', 'quick']
    fail_msg: "cloudflare_tunnel_mode must be 'token' or 'quick'"

- name: Validate token is provided when token mode is used
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_token | length > 0
    fail_msg: "Set cloudflare_tunnel_token when cloudflare_tunnel_mode=token"
  when: cloudflare_tunnel_mode == 'token'

- name: Set cloudflared command for token-managed tunnel
  ansible.builtin.set_fact:
    cloudflare_tunnel_command: >-
      tunnel --no-autoupdate run --token {{ cloudflare_tunnel_token | quote }}
  when: cloudflare_tunnel_mode == 'token'
  no_log: true

- name: Set cloudflared command for quick tunnel
  ansible.builtin.set_fact:
    cloudflare_tunnel_command: >-
      tunnel --no-autoupdate --url {{ cloudflare_horizon_origin_url | quote }}
  when: cloudflare_tunnel_mode == 'quick'

- name: Check existing cloudflared container
  ansible.builtin.command: >-
    docker ps -a --filter name=^/{{ cloudflare_tunnel_container_name }}$ --format {{"{{.ID}}"}}
  register: cloudflare_tunnel_container_id
  changed_when: false

- name: Remove existing cloudflared container before reconfiguration
  ansible.builtin.command: docker rm -f {{ cloudflare_tunnel_container_name }}
  when: cloudflare_tunnel_container_id.stdout | trim != ""

- name: Start cloudflared tunnel container
  ansible.builtin.shell: >-
    docker run -d
    --name {{ cloudflare_tunnel_container_name }}
    --restart unless-stopped
    --network host
    {{ cloudflare_tunnel_image }}
    {{ cloudflare_tunnel_command }}
  args:
    executable: /bin/bash
  register: cloudflare_tunnel_start
  changed_when: true
  no_log: true

- name: Verify cloudflared container is running
  ansible.builtin.command: docker inspect -f {{"{{.State.Running}}"}} {{ cloudflare_tunnel_container_name }}
  register: cloudflare_tunnel_running
  changed_when: false
  failed_when: cloudflare_tunnel_running.stdout | trim != "true"

- name: Read quick tunnel URL from container logs
  ansible.builtin.shell: >-
    docker logs {{ cloudflare_tunnel_container_name }} 2>&1
    | grep -Eo 'https://[-a-z0-9]+\.trycloudflare\.com'
    | tail -n 1
  args:
    executable: /bin/bash
  register: cloudflare_quick_tunnel_url
  changed_when: false
  failed_when: false
  when: cloudflare_tunnel_mode == 'quick'

- name: Show quick tunnel URL
  ansible.builtin.debug:
    msg: "Horizon quick tunnel URL: {{ cloudflare_quick_tunnel_url.stdout | default('not found yet, check docker logs ' ~ cloudflare_tunnel_container_name) }}"
  when: cloudflare_tunnel_mode == 'quick'

