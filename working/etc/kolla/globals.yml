---
kolla_base_distro: "ubuntu"
kolla_install_type: "binary"
openstack_release: "2025.1"

kolla_internal_vip_address: "10.200.0.1"
network_interface: "wg0"
api_interface: "wg0"

enable_haproxy: "no"
enable_keepalived: "yes"
enable_proxysql: "yes"
keystone_wsgi_provider: "apache"

enable_cinder: "no"
enable_central_logging: "no"
enable_grafana: "no"
enable_prometheus: "yes"
enable_fluentd: "yes"

enable_neutron: "yes"
enable_octavia: "yes"
enable_octavia_jobboard: "yes"
enable_valkey: "yes"
neutron_external_interface: "{{ hostvars[groups['network'][0]].external_interface }}"

octavia_certs_country: "SK"
octavia_certs_state: "Bratislava"
octavia_certs_organization: "karafra"
octavia_certs_organizational_unit: "Octavia"
octavia_certs_server_ca_common_name: "server-ca.karafra.lan"
octavia_certs_client_ca_common_name: "client-ca.karafra.lan"
octavia_certs_client_req_common_name: "client.karafra.lan"

nova_compute_virt_type: "qemu"
